name: Daily Case Report - sv-in-ops

on:
  schedule:
    - cron: "30 3 * * *"   # 9:00 AM IST (fallback)
  workflow_dispatch:
  repository_dispatch:
    types: [run-tat-report]

jobs:
  send-report:
    name: Send 9 AM Case Update to Slack
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily report
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: python report.py
